name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install package
        run: pip install -e .

      - name: Verify import
        run: python -c "import devalpha_mcp; print('import OK')"

  security:
    uses: LibruaryNFT/shared-workflows/.github/workflows/security-scan.yml@main

  notify:
    needs: [test, security]
    if: failure()
    permissions:
      issues: write
    uses: LibruaryNFT/shared-workflows/.github/workflows/notify-failure.yml@main
    with:
      project: 'devalpha-mcp'
