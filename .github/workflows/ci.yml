name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    uses: LibruaryNFT/shared-workflows/.github/workflows/python-ci.yml@main
    with:
      python-version: '3.12'
      requirements-file: 'requirements.txt'
      test-command: 'python -m pytest tests/ -v'

  security:
    uses: LibruaryNFT/shared-workflows/.github/workflows/security-scan.yml@main

  notify:
    needs: [test, security]
    if: failure()
    uses: LibruaryNFT/shared-workflows/.github/workflows/notify-failure.yml@main
    with:
      project: 'devalpha-mcp'
